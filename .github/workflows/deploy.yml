name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: a32a814c-fca3-4750-904a-790651d4ccc6.tenants.hivecompute.ai
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 31041
          script: |
            set -e
            cd ~/waggle
            git pull origin main
            source ~/waggle/backend/venv/bin/activate
            pip install -r ~/waggle/backend/requirements.txt --quiet
            sudo systemctl restart waggle
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd ~/waggle/frontend
            pnpm install --frozen-lockfile
            pnpm build
            echo "Deploy complete"